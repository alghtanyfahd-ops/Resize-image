<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resize Image</title>
<meta name="keywords" content="Resize Image, image resizer, resize photo, compress image, Pi Browser">

<meta name="author" content="Resize Image">

<meta property="og:title" content="Resize Image">

<meta property="og:description" content="Fast and easy image resizing tool for Pi Browser.">

<meta property="og:type" content="website">
<meta name="description" content="Resize Image is a fast and free image resizing tool for Pi Browser. Resize photos online while keeping high quality.">

<meta name="theme-color" content="#6f3ff5">

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile.css">

</head>

<body>

<header class="topbar">

    <h1>Resize Image</h1>

    <p class="subtitle">
        Fast & Easy Image Resizer
    </p>

</header>
<div id="loginPage" class="login-page">

    <div class="login-box">

        <h1>
            Resize Image
        </h1>

        <p>
            أداة تغيير حجم الصور بسهولة
        </p>


        <button onclick="enterApp()">
            الدخول إلى التطبيق
        </button>


<button id="loginBtn" onclick="loginAndEnter()">
    تسجيل الدخول بواسطة Pi
</button>


        <p id="piUser"></p>

    </div>

</div>
<main class="container hidden" id="appPage">

    <section class="card">

        <h2>Select Image</h2>

        <input
            type="file"
            id="imageInput"
            accept="image/*">

        <div id="previewArea">

            <img
                id="preview"
                alt="Preview">

        </div>

    </section>

    <section class="card">

        <h2>Resize</h2>

        <div class="row">

            <label>

                Width

                <input
                    type="number"
                    id="width"
                    min="1">

            </label>

            <label>

                Height

                <input
                    type="number"
                    id="height"
                    min="1">

            </label>

        </div>

        <label class="checkbox">

            <input
                type="checkbox"
                id="lockRatio"
                checked>

            Keep aspect ratio

        </label>

        <button id="resizeBtn">

            Resize Image

        </button>

    </section>

<section class="card">

    <h2>Download</h2>

    <canvas
        id="canvas"
        style="display:none;">
    </canvas>

    <label>Image Format</label>

    <select id="imageFormat">
        <option value="image/jpeg">JPG</option>
        <option value="image/png">PNG</option>
        <option value="image/webp">WEBP</option>
    </select>

    <label>Quality</label>

    <input
        type="range"
        id="quality"
        min="10"
        max="100"
        value="90">

    <div id="qualityValue">90%</div>

    <div id="imageInfo">
        Original Size:
        <span id="originalSize">0 KB</span>
        <br>
        New Size:
        <span id="newSize">0 KB</span>
    </div>

    <button id="downloadBtn" disabled>
        Download Image
    </button>



</section>

</main>

<footer>

    © 2026 Resize Image

</footer>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script src="pi.js"></script>
<script src="app.js"></script>

</body>
</html>
